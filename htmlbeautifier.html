<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HTML Beautifier | Puravigal Tools</title>
  <meta name="description" content="Beautify and format HTML instantly with Puravigal's lightweight HTML Beautifier tool.">
  <meta name="keywords" content="html beautifier, html formatter, puravigal tools">
  <link rel="canonical" href="https://puravigal.com/htmlbeautifier">
  <link rel="icon" href="/images/fav/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/css/common.css">
  <style>
    .editor-grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(280px,1fr)); gap:16px; }
    .editor-pane { min-height: 360px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,.16); }
    .tool-actions { display:flex; flex-wrap:wrap; gap:10px; margin: 12px 0 20px; }
  </style>
  <script defer src="/js/common.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.13/ace.js"></script>
  <script defer src="/js/htmlBeautifier.js"></script>
  <script defer src="/js/custom.js"></script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div data-include="/partials/global-header.html"></div>
  <main id="main" class="container section">
    <h1>HTML Beautifier</h1>
    <p class="lead">Paste minified or unstructured HTML and format it with consistent indentation.</p>

    <div class="tool-actions">
      <button class="btn" type="button" onclick="beautifyHTML()">Beautify</button>
      <button class="btn secondary" type="button" onclick="copyHTML()">Copy Output</button>
      <button class="btn secondary" type="button" onclick="downloadHTML()">Download</button>
      <button class="btn secondary" type="button" onclick="triggerFileUpload()">Upload HTML</button>
      <input type="file" id="fileInput" class="input" accept=".html" style="max-width:280px">
    </div>

    <div id="editor_wrapper_id" class="editor-grid">
      <div id="htmlInput" class="editor-pane" aria-label="Input HTML editor"></div>
      <div id="beautifiedHtml" class="editor-pane" aria-label="Formatted HTML editor"></div>
    </div>
  </main>
  <div data-include="/partials/global-footer.html"></div>
</body>
</html>
